server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/manifest+json;
    gzip_min_length 256;
    gzip_vary on;

    # SEO / discovery files
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
        default_type text/plain;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600";
        default_type application/xml;
        try_files $uri =404;
    }

    location = /llms.txt {
        add_header Cache-Control "public, max-age=3600";
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /.well-known/ {
        add_header Cache-Control "public, max-age=3600";
        default_type text/plain;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for service worker & manifest
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }
}
