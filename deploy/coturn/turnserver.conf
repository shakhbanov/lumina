# Lumina TURN Server Configuration

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
external-ip=72.56.80.252
relay-ip=72.56.80.252

# Realm must match what clients expect
realm=lumina.su
server-name=lumina.su

# HMAC ephemeral credentials (matches backend TURN_SECRET)
use-auth-secret
static-auth-secret=Datr1x_TURN_Secret_2026_HmacKey!

# TLS
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Relay ports
min-port=49152
max-port=65535

# Limits
total-quota=1200
user-quota=12
max-bps=0

# Security
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Fingerprint
fingerprint

# Logging
log-file=stdout
verbose
new-log-timestamp
