<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Video camera icon -->
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camera body -->
    <rect x="-140" y="-80" width="210" height="160" rx="24" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <!-- Camera lens/record -->
    <path d="M70,-30 L140,-70 L140,70 L70,30" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <!-- Encryption shield -->
    <circle cx="-35" cy="0" r="30" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="20"/>
  </g>
</svg>
