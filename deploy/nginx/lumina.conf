# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=livekit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Map: only pass Connection: upgrade on WS upgrades, otherwise "close".
map $http_upgrade $connection_upgrade {
    default     "";
    websocket   "upgrade";
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name lumina.su;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lumina.su;

    # --- TLS ---
    ssl_certificate /etc/letsencrypt/live/lumina.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumina.su/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), fullscreen=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://lumina.su https://lumina.su; media-src 'self' blob:; worker-src 'self' blob:; img-src 'self' data: blob:; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;

    # --- Connection limits ---
    limit_conn conn 100;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # --- Frontend SPA ---
    root /var/www/lumina/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML files — no cache (for SPA routing)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # --- Service Worker ---
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # --- REST API proxy ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # --- WebSocket proxy ---
    location /ws {
        limit_req zone=ws burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- LiveKit signalling (browser → host livekit-server) ---
    # STRICT whitelist: only /rtc* is reachable publicly. The LiveKit admin
    # plane (/twirp/*, /rtc/validate, internal endpoints) MUST NOT be proxied —
    # those are called server-side only and leaking them turns a JWT leak into
    # full-room takeover (CVE-2025-23445 class).

    location = /livekit/rtc {
        limit_req zone=livekit burst=20 nodelay;
        limit_conn conn 10;
        proxy_pass http://127.0.0.1:7880/rtc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /livekit/rtc/ {
        limit_req zone=livekit burst=20 nodelay;
        limit_conn conn 10;
        proxy_pass http://127.0.0.1:7880/rtc/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Explicit deny for LiveKit admin plane and anything else under /livekit/.
    location ^~ /livekit/ {
        return 404;
    }

    # --- Block sensitive paths ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Logging ---
    access_log /var/log/nginx/lumina.access.log;
    error_log /var/log/nginx/lumina.error.log warn;
}
