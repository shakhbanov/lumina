# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=livekit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Map: only pass Connection: upgrade on WS upgrades, otherwise "close".
map $http_upgrade $connection_upgrade {
    default     "";
    websocket   "upgrade";
}

# Extended access log capturing User-Agent — used to track AI crawlers
# (GPTBot, ClaudeBot, PerplexityBot, Google-Extended, YandexBot, Bingbot)
# and validate that llms.txt / prerendered HTML reach them.
log_format lumina_seo '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time';

# HTTP -> HTTPS redirect (apex + www)
server {
    listen 80;
    listen [::]:80;
    server_name lumina.su www.lumina.su;
    return 301 https://lumina.su$request_uri;
}

# www.lumina.su -> lumina.su (canonical hostname)
# NOTE: enable only after expanding the TLS certificate:
#   certbot --expand -d lumina.su -d www.lumina.su
# Until then this server block is safe to leave commented — nginx would fail
# to start otherwise because the cert does not cover www.lumina.su.
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name www.lumina.su;
#     ssl_certificate /etc/letsencrypt/live/lumina.su/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/lumina.su/privkey.pem;
#     ssl_protocols TLSv1.3;
#     return 301 https://lumina.su$request_uri;
# }

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lumina.su;

    # --- TLS ---
    ssl_certificate /etc/letsencrypt/live/lumina.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumina.su/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), fullscreen=(self)" always;
    # CSP: allow Yandex.Metrika (mc.yandex.ru / mc.yandex.com) for analytics.
    # Inline Metrika bootstrap in index.html is permitted via its SHA-256 hash
    # — update the hash if the inline block changes. Compute with:
    #   node -e "const crypto=require('crypto'); const fs=require('fs'); const html=fs.readFileSync('/var/www/lumina/dist/index.html','utf8'); const m=html.match(/<script type=\"text\\/javascript\">[\\s\\S]*?<\\/script>/); console.log('sha256-'+crypto.createHash('sha256').update(m[0].replace(/<\\/?script[^>]*>/g,'')).digest('base64'));"
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://mc.yandex.ru 'sha256-yCdwpGCU3Mk001nSp9LwwfAwYfkwdJjn9IhL3pYaH7w='; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://lumina.su https://lumina.su https://mc.yandex.ru https://mc.yandex.com https://api.github.com; media-src 'self' blob:; worker-src 'self' blob:; img-src 'self' data: blob: https://mc.yandex.ru; frame-src https://mc.yandex.ru; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;

    # --- Connection limits ---
    limit_conn conn 100;

    # --- Gzip ---
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/manifest+json;
    gzip_min_length 256;
    gzip_vary on;

    # --- Frontend SPA ---
    root /var/www/lumina/dist;
    index index.html;

    # --- SEO / discovery files (explicit Content-Type, bypass SPA fallback) ---
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
        default_type text/plain;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600";
        default_type application/xml;
        try_files $uri =404;
    }

    location = /llms.txt {
        add_header Cache-Control "public, max-age=3600";
        default_type text/plain;
        try_files $uri =404;
    }

    # .well-known (security.txt, ACME). This ^~ block outranks the later
    # "location ~ /\." dotfile-deny regex and must appear BEFORE it.
    location ^~ /.well-known/ {
        add_header Cache-Control "public, max-age=3600";
        default_type text/plain;
        try_files $uri =404;
    }

    # --- OG / social preview images ---
    location = /og-image.png {
        expires 30d;
        add_header Cache-Control "public";
    }
    location = /og-image-en.png {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML files — no cache (for SPA routing)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # --- Service Worker ---
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # --- REST API proxy ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # --- WebSocket proxy ---
    location /ws {
        limit_req zone=ws burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- LiveKit signalling (browser → host livekit-server) ---
    # STRICT whitelist: only /rtc* is reachable publicly. The LiveKit admin
    # plane (/twirp/*, /rtc/validate, internal endpoints) MUST NOT be proxied —
    # those are called server-side only and leaking them turns a JWT leak into
    # full-room takeover (CVE-2025-23445 class).

    location = /livekit/rtc {
        limit_req zone=livekit burst=20 nodelay;
        limit_conn conn 10;
        proxy_pass http://127.0.0.1:7880/rtc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /livekit/rtc/ {
        limit_req zone=livekit burst=20 nodelay;
        limit_conn conn 10;
        proxy_pass http://127.0.0.1:7880/rtc/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Explicit deny for LiveKit admin plane and anything else under /livekit/.
    location ^~ /livekit/ {
        return 404;
    }

    # --- Block sensitive paths ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Logging ---
    # Use the lumina_seo format so User-Agent is captured for each request.
    # This lets you grep AI crawlers:
    #   grep -E "GPTBot|ClaudeBot|PerplexityBot|Google-Extended|YandexBot" /var/log/nginx/lumina.access.log
    access_log /var/log/nginx/lumina.access.log lumina_seo;
    error_log /var/log/nginx/lumina.error.log warn;
}
